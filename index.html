<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Skincare</title>

<style>
:root{
  --bg:#f6f1ea;
  --text:#1b1b1b;
  --muted:#6b6b6b;
  --accent:#b08d57;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HERO */
.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:60px 20px;
}

.hero img{
  width:90%;
  max-width:420px;
  border-radius:20px;
}

.hero h1{font-size:32px;}
.hero p{color:var(--muted); max-width:500px;}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  max-width:900px;
  margin:auto;
  padding:20px;
}

.gallery img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
}

/* BEFORE / AFTER */
.ba{
  text-align:center;
  padding:30px;
}

.ba-box{
  position:relative;
  max-width:420px;
  margin:auto;
  overflow:hidden;
  border-radius:15px;
}

.ba-box img{width:100%;}

.after{
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.handle{
  position:absolute;
  top:0;
  left:50%;
  width:3px;
  height:100%;
  background:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
}

/* REVIEWS */
.review{
  background:white;
  max-width:400px;
  margin:10px auto;
  padding:15px;
  border-radius:12px;
}

.stars{color:gold;}

/* DESKTOP */
@media(min-width:768px){
  .hero{flex-direction:row; gap:40px; text-align:left;}
  .grid{grid-template-columns:repeat(3,1fr);}
  .gallery img{height:260px;}
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
  <img src="https://cdn.shopify.com/s/files/1/0991/8038/0469/files/assetsproduct_jpg.jpg?v=1776074448" alt="product">
  <div>
    <h1>Radiance, Engineered</h1>
    <p>Luxury skincare designed for hydration, glow, and skin balance.</p>
  </div>
</section>

<!-- GALLERY -->
<section class="gallery">
  <img src="https://cdn.shopify.com/s/files/1/0991/8038/0469/files/pexels-misolo-cosmetic-2588316-4841465.jpg?v=1776078581" alt="">
  <img src="https://cdn.shopify.com/s/files/1/0991/8038/0469/files/pexels-misolo-cosmetic-2588316-4841389.jpg?v=1776078579" alt="">
  <img src="https://cdn.shopify.com/s/files/1/0991/8038/0469/files/pexels-misolo-cosmetic-2588316-4841473.jpg?v=1776078584" alt="">
</section>

<!-- BEFORE AFTER -->
<section class="ba">
  <div class="ba-box">
    <img src="https://cdn.shopify.com/s/files/1/0991/8038/0469/files/before.png?v=1776074446" alt="">
    <div class="after">
      <img src="https://cdn.shopify.com/s/files/1/0991/8038/0469/files/after_jpg.png?v=1776074447" alt="">
    </div>
    <div class="handle"></div>
  </div>
</section>

<!-- INGREDIENTS -->
<section class="grid">
  <div class="card"><b>Hyaluronic Acid</b><br>Deep hydration for skin</div>
  <div class="card"><b>Niacinamide</b><br>Improves tone and brightness</div>
  <div class="card"><b>Peptides</b><br>Supports firmness and collagen</div>
</section>

<!-- REVIEWS -->
<section>
  <div class="review">
    <div class="stars">★★★★★</div>
    Amazing hydration and glow.
  </div>

  <div class="review">
    <div class="stars">★★★★★</div>
    Feels like premium skincare.
  </div>
</section>

<script>
const box = document.querySelector('.ba-box');
const after = document.querySelector('.after');
const handle = document.querySelector('.handle');

if(box && after && handle){
  let active=false;

  const move = (x)=>{
    const rect = box.getBoundingClientRect();
    let percent = ((x - rect.left)/rect.width)*100;
    percent = Math.max(0, Math.min(100, percent));
    after.style.width = percent + '%';
    handle.style.left = percent + '%';
  }

  box.addEventListener('mousedown',()=>active=true);
  box.addEventListener('mouseup',()=>active=false);
  box.addEventListener('mouseleave',()=>active=false);

  box.addEventListener('mousemove',(e)=>{
    if(active) move(e.clientX);
  });

  box.addEventListener('touchmove',(e)=>{
    move(e.touches[0].clientX);
  });
}
</script>

</body>
</html>
