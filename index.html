<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Product Page</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<header class="hero">
  <h1 class="fade-up">Radiant Skin Starts Here</h1>
  <p class="fade-up delay">Luxury skincare with visible transformation</p>
</header>

<!-- PRODUCT -->
<section class="product">

  <div class="image fade-left">
    <img src="https://images.unsplash.com/photo-1612810436541-336d4b5a0f5f" alt="product">
  </div>

  <div class="info fade-right">
    <h2>Luxury Skin Cream</h2>
    <p class="price">$39.00</p>

    <p class="desc">
      Deep hydration formula that smooths, brightens, and restores natural glow.
    </p>

    <button class="cta">Add to Cart</button>

    <div class="badges">
      <span>Free Shipping</span>
      <span>30-Day Guarantee</span>
      <span>5K+ Reviews</span>
    </div>
  </div>

</section>

<!-- BEFORE AFTER -->
<section class="before-after">

  <h2 class="fade-up">Real Transformation</h2>

  <div class="slider fade-up">

    <img class="before" src="https://images.unsplash.com/photo-1556228720-195a672e8a03">
    
    <div class="after">
      <img src="https://images.unsplash.com/photo-1556228453-efd6c1ff04f6">
    </div>

    <div class="handle"></div>

    <input type="range" min="0" max="100" value="50">

  </div>

</section>

<script src="script.js"></script>
</body>
</html>
